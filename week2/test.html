<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: rgb(136, 184, 231);
        }

        h1 {
            color: rgb(37, 104, 171);
            font-family: 'Arial', sans-serif;
            text-align: center;
            text-decoration: underline;
            font-size: 36px;
        }

        h1.nounderline {
            text-decoration: none;
            font-size: 20px;
        }

        h1.nocolour {
            color: black;
            text-decoration: none;
            font-size: 20px;
        }

        img {
            display: block;
            /*Make the image non sharing spacing*/
            margin: auto;
            /*Center the image horizontally*/
            margin-bottom: 20px;

        }

        p {
            color: rgb(72, 87, 28);
            font-family: 'Times New Roman', serif;
            background-color: rgb(216, 233, 243);
            padding: 15px;
            margin: 40px;
            border-radius: 20px;
            border: 2px solid rgb(28, 59, 87);
        }
    </style>
</head>

<body>
    <h1>Twitter</h1>

    <h1 class="nounderline">What is Twitter?</h1>

    <h1 class="nocolour">History of Twitter</h1>

    <img src="images/twitter.png" width="50" alt="Twitter Logo">

    <img src="images/twitter.png" width="50" alt="Twitter Logo">

    <p>
        Twitter is a social media platform that allows users to post and interact with messages known as "tweets". It
        was founded in 2006 and has become one of the most popular social media platforms worldwide.
    </p>
</body>

</html>
