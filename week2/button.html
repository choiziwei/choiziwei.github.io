<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 1</title>
    <style>
        button.request-now-button {
            color: white;
            background-color: rgb(0, 0, 0);
            padding: 10px 20px;
            margin: 5px;
            font-size: 14px;
            border: none;
        }

        button.sign-up-button {
            color: white;
            background-color: rgb(85, 163, 90);
            padding: 10px 25px;
            margin: 10px;
            font-size: 14px;
            border-radius: 7px;
            border: none;
        }

        button.add-to-cart-button {
            color: rgb(0, 0, 0);
            background-color: rgb(249, 218, 78);
            padding: 7px 50px;
            margin: 5px;
            font-size: 16px;
            border-radius: 50px;
            border: none;
        }

        button.get-started-button {
            color: white;
            background-color: rgb(115, 83, 173);
            padding: 10px 20px;
            margin: 10px 2px 10px 10px;
            font-size: 14px;
            border-radius: 5px;
            border: rgb(115, 83, 173) solid 2px;
        }

        button.download-button {
            color: rgb(124, 129, 134);
            background-color: rgb(255, 255, 255);
            padding: 10px 20px;
            margin: 10px 13px 10px 5px;
            font-size: 14px;
            border-radius: 5px;
            border: rgb(124, 129, 134) solid 1px;
        }

        button.apply-button {
            color: white;
            background-color: rgb(45, 101, 188);
            padding: 10px 20px;
            margin: 5px 1px;
            font-size: 14px;
            border-radius: 50px;
            border: none;
        }

        button.save-button {
            color: rgb(53, 104, 184);
            background-color: rgb(255, 255, 255);
            padding: 8px 20px;
            margin: 5px;
            font-size: 14px;
            border-radius: 50px;
            border: rgb(53, 104, 184) solid 2px;
        }
    </style>
</head>

<body>

    <button class="request-now-button">Request now</button>
    <button class="sign-up-button"><b>Sign Up</b></button>
    <button class="add-to-cart-button">Add to Cart</button><br>
    <button class="get-started-button"><b>Get Started</b></button>
    <button class="download-button"><b>Download</b></button>
    <button class="apply-button"><b>Apply on company website</b></button>
    <button class="save-button"><b>Save</b></button>

</body>

</html>
